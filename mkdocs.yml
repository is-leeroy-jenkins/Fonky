site_name: Fonky Documentation
site_description: Documentation for the Fonky Python framework.
site_author: Terry D. Eppler
site_url: https://is-leeroy-jenkins.github.io/Fonky/

repo_url: https://github.com/is-leeroy-jenkins/Fonky
repo_name: is-leeroy-jenkins/Fonky


plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths:
            - .
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_root_full_path: false
            show_signature: true
            show_signature_annotations: true
            separate_signature: true
            merge_init_into_class: false
            members_order: source
            filters:
              - "!^_"
            heading_level: 2

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - toc:
      permalink: true
      toc_depth: 3
  - tables
  - footnotes
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Configuration: configuration.md
  - Architecture: architecture.md
  - Usage Examples: usage.md
  - User Guide: user-guide.md
  - Core: api/core.md
  - Models: api/models.md
  - Loaders: api/loaders.md
  - Fetchers: api/fetchers.md
  - Scrapers: api/scrapers.md
  - Processors: api/processors.md
  - Boogr: api/boogr.md
  - Development: development.md
  - GitHub Pages: github-pages.md

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/extra.js